# https://taskfile.dev

version: '3'

vars:
  IMAGE: ghcr.io/lillevang/timeline
  TAG_FILE: .version
  TAG:
    sh: cat .version
  RUNTIME:
    sh: command -v podman >/dev/null 2>&1 && echo podman || echo docker

tasks:

  bump:
    desc: Bump version (patch, minor, major)
    vars:
      TARGET: '{{.TARGET | default "patch"}}'
    cmds:
      -  |
         CURRENT=$(cat {{.TAG_FILE}})
         IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
         case "{{.TARGET}}" in
          patch) PATCH=$((PATCH+1));;
          minor) MINOR=$((MINOR+1)); PATCH=0;;
          major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
          *) echo "Unknown bump target: {{.TARGET}}" && exit 1;;
         esac
         NEW="$MAJOR.$MINOR.$PATCH"
         echo "$NEW" > {{.TAG_FILE}}
         echo "🔼 Bumped version: $CURRENT → $NEW"
         
  build:
    desc: Build the website container image
    cmds:
      - "{{.RUNTIME}} build -t {{.IMAGE}}:{{.TAG}} ."

  healthcheck:
    desc: Run local container and check /healthz
    cmds:
      - |
        echo "🚀 Starting container {{.IMAGE}}:{{.TAG}}"
        NETWORK_OPT=$([ "{{.RUNTIME}}" = "podman" ] && echo "--network=slirp4netns" || echo "")
        CID=$({{.RUNTIME}} run -d $NETWORK_OPT -p 8081:8080 {{.IMAGE}}:{{.TAG}})
        echo "⌛ Waiting for container to be ready"
        sleep 3
        if [ "$(curl --max-time 5 -fs http://localhost:8081/healthz)" = "ok" ]; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed"
          {{.RUNTIME}} logs "$CID"
          {{.RUNTIME}} stop "$CID" && {{.RUNTIME}} rm "$CID"
          exit 1
        fi
        {{.RUNTIME}} stop "$CID" && {{.RUNTIME}} rm "$CID"

  verify:
    desc: Build and verify health
    cmds:
      - task: build
      - task: healthcheck

  push:
    desc: Push the image to GHCR
    cmds:
      - |
        echo "📦 Pushing image {{.IMAGE}}:{{.TAG}}"
        {{.RUNTIME}} push {{.IMAGE}}:{{.TAG}}

  resolve-digest:
    internal: true
    cmds:
      - |
        set -euo pipefail
        # Digest from the REGISTRY (what the cluster pulls and Kyverno
        # verifies), validated so a registry blip can't truncate .digest and
        # send cosign at "{{.IMAGE}}@" with a misleading error. skopeo shares
        # podman's credential store, unlike crane.
        DIGEST=$(skopeo inspect --no-tags docker://{{.IMAGE}}:{{.TAG}} | jq -er .Digest)
        case "$DIGEST" in
          sha256:*) ;;
          *) echo "❌ unexpected digest for {{.IMAGE}}:{{.TAG}}: '$DIGEST'"; exit 1;;
        esac
        echo "$DIGEST" > .digest

  sign:
    desc: Sign the pushed image digest with cosign (key injected from 1Password, never on disk)
    vars:
      OP_ITEM: '{{.OP_ITEM | default "op://Personal/cosign"}}'
    cmds:
      - task: resolve-digest
      - |
        set -euo pipefail
        DIGEST=$(cat .digest)
        echo "🔏 Signing image {{.IMAGE}}@$DIGEST"
        # cosign only reads docker-style config — hand it the registry creds
        # podman actually logged in with, via a throwaway DOCKER_CONFIG.
        # REGISTRY_AUTH_FILE wins when set (podman writes there instead); else
        # podman's default lives on tmpfs under XDG_RUNTIME_DIR.
        AUTH_JSON="${REGISTRY_AUTH_FILE:-${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/containers/auth.json}"
        [ -f "$AUTH_JSON" ] || { echo "❌ no registry auth at $AUTH_JSON — log in to GHCR first"; exit 1; }
        DOCKER_CONFIG=$(mktemp -d)
        export DOCKER_CONFIG
        trap 'rm -rf "$DOCKER_CONFIG"' EXIT
        cp "$AUTH_JSON" "$DOCKER_CONFIG/config.json"
        # Assign on their own lines, NOT as a `VAR=$(op read ...) cosign ...`
        # prefix: errexit ignores a failed substitution in an assignment
        # prefix, so a dead 1Password session hands cosign an EMPTY key and
        # fails with a misleading "invalid pem block" (url-shortener PR #13).
        COSIGN_PRIVATE_KEY=$(op read "{{.OP_ITEM}}/private-key")
        COSIGN_PASSWORD=$(op read "{{.OP_ITEM}}/password")
        export COSIGN_PRIVATE_KEY COSIGN_PASSWORD
        # The three flags are LOAD-BEARING (infra docs/kyverno.md, Phase 3):
        # cosign v3 defaults to the sigstore bundle format, which Kyverno 1.18
        # cannot verify key-based. WITHOUT THEM THE RELEASE IS UNVERIFIABLE by
        # the cluster — the canary's 0.0.9 was signed manually with them; this
        # task predated that discovery and would have regressed the format.
        cosign sign --yes \
          --new-bundle-format=false --use-signing-config=false --tlog-upload=false \
          --key env://COSIGN_PRIVATE_KEY \
          {{.IMAGE}}@$DIGEST

  trivy:
    desc: Generate SBOM and vulnerability report with Trivy
    cmds:
      - mkdir -p ./security
      - echo "🔍 Generating SBOM with Trivy"
      - trivy image --format cyclonedx --output ./security/sbom-{{.TAG}}.json {{.IMAGE}}:{{.TAG}}
      - echo "🛡 Generating vulnerability scan report"
      - trivy image --format json --scanners vuln --output ./security/vulns-{{.TAG}}.json {{.IMAGE}}:{{.TAG}}

  commit-artifacts:
    desc: Commit .version, digest, SBOM and vuln reports to Git
    cmds:
      - |
        echo "📦 Committing version + security artifacts"
        git add .version .digest security/sbom-{{.TAG}}.json security/vulns-{{.TAG}}.json
        git commit -m "🚀 Release {{.TAG}}"
        git push

  release:
    desc: Full release pipeline (build, push, sign, scan, commit)
    cmds:
      - task: verify
      - task: push
      - task: sign
      - task: trivy
      - task: commit-artifacts
      - echo ""
      - echo "✅ Released {{.IMAGE}}:{{.TAG}}"
      - echo "   Update the image reference in your ArgoCD repo to deploy."
